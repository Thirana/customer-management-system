spring:
  datasource:
    # Matches the repository root Docker Compose MariaDB service.
    url: jdbc:mariadb://localhost:3306/customer_management
    username: cms_user
    password: cms_password
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MariaDB103Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.example.customermanagement: INFO
    org.hibernate.SQL: WARN
