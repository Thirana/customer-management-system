spring:
  profiles:
    active: dev
  application:
    name: customer-management-backend
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jpa:
    hibernate:
      # Flyway owns schema changes; Hibernate should only validate mappings.
      ddl-auto: validate
    # Avoid accidental lazy loading during JSON serialization.
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /docs

app:
  frontend:
    allowed-origin: http://localhost:3000
  import:
    # These values are also validated through AppProperties at startup.
    batch-size: 500
    max-file-size-mb: 100
    max-stored-errors: 100
  async:
    # Keep import processing bounded so uploads cannot consume all request threads.
    core-pool-size: 2
    max-pool-size: 5
    queue-capacity: 10
